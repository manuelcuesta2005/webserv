# ============================================================
#  webserv.conf — Configuración canónica de ejemplo
#  Reglas:
#   - Estilo NGINX (llaves y ';')
#   - Sin herencia: root/index/methods/autoindex SOLO en location
#   - client_max_body_size puede ir en server y sobreescribirse en location
#   - Tamaños en bytes (sin sufijos K/M/G)
#   - Rutas relativas al directorio desde donde se lance el binario
#     (típicamente la raíz del repo)
# ============================================================


# ============================================================
#  SERVIDOR 1 — Sitio principal en puerto 8080
# ============================================================
server {

    listen      0.0.0.0:8080;
    server_name localhost mysite.local;

    client_max_body_size    10485760;          # 10 MB en bytes

    error_page  400  ./www/errors/400.html;
    error_page  403  ./www/errors/403.html;
    error_page  404  ./www/errors/404.html;
    error_page  405  ./www/errors/405.html;
    error_page  413  ./www/errors/413.html;
    error_page  500  ./www/errors/500.html;


    location / {
        root            ./www/html;
        index           index.html index.htm;
        methods         GET POST;
        autoindex       off;
    }

    location /uploads {
        root            ./www/html/uploads;
        methods         GET POST DELETE;
        autoindex       on;
        upload_store    ./www/html/uploads;
        client_max_body_size  52428800;         # 50 MB sobreescribe el del server
    }

    location /images {
        root            ./www/html/images;
        methods         GET;
        autoindex       off;
    }

    location /old {
        return          301 /new;
    }

    location /new {
        root            ./www/html;
        methods         GET;
        autoindex       off;
        index           new_index.html;
    }

    location /api {
        root            ./www/html/api;
        methods         POST DELETE;
        autoindex       off;
    }

    location /cgi-bin {
        root            ./www/cgi-bin;
        methods         GET POST;
        autoindex       off;
        cgi_extension   .php  /usr/bin/php-cgi;
        cgi_extension   .py   /usr/bin/python3;
    }

    # Caso /kapouet -> ./www/kapouet (versión relativa del ejemplo del subject)
    location /kapouet {
        root            ./www/kapouet;
        methods         GET;
        autoindex       on;
        index           index.html;
    }
}


# ============================================================
#  SERVIDOR 2 — Sitio en puerto 8081
# ============================================================
server {

    listen      0.0.0.0:8081;
    server_name admin.local;

    client_max_body_size    1048576;            # 1 MB

    error_page  404  ./www/errors/404.html;
    error_page  500  ./www/errors/500.html;

    location / {
        root            ./www/admin;
        methods         GET POST;
        autoindex       off;
        index           dashboard.html;
    }

    location /files {
        root            ./www/admin/uploads;
        methods         GET POST DELETE;
        autoindex       on;
        upload_store    ./www/admin/uploads;
        client_max_body_size  104857600;        # 100 MB
    }

    location /scripts {
        root            ./www/admin/scripts;
        methods         GET POST;
        autoindex       off;
        cgi_extension   .py  /usr/bin/python3;
    }

    location /legacy {
        return          302 /;
    }
}


# ============================================================
#  SERVIDOR 3 — Solo loopback, puerto 9090
# ============================================================
server {

    listen      127.0.0.1:9090;
    server_name internal.local;

    client_max_body_size    5242880;            # 5 MB

    error_page  403  ./www/errors/403.html;
    error_page  404  ./www/errors/404.html;

    location / {
        root            ./www/internal;
        methods         GET;
        autoindex       off;
        index           index.html;
    }

    location /data {
        root            ./www/internal/data;
        methods         GET POST DELETE;
        autoindex       on;
        upload_store    ./www/internal/data/uploads;
    }
}